<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>todolist</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />

</head>
<body>
      <div class="container d-flex justify-content-center mt-5">
    <div id="loginCard" class="card position-relative shadow p-4 w-100" style="max-width: 400px;">
      <h4 class="mb-4 text-center">Todo List</h4>

      <form>
        <div class="mb-3">
          <label for="item" class="form-label">Add Task</label>
          <input type="text" class="form-control" id="item" placeholder="Enter Todo">
          <input type="hidden" id="itemid">
          <button id="add" type="button" class="btn btn-primary w-100 mt-4" onclick="addList()">Add</button>
          <button id="edit" type="button" class="btn btn-primary w-100 mt-4" onclick="editList()">Edit</button>

        </div>

        
      </form>
    </div>
  </div>

  <div class="container mt-5">
    <h2 class="text-center mb-4">Your Tasks</h2>
    <table class="table table-bordered table-striped">
      <thead class="table-dark">
        <tr>
          <th scope="col">#</th>
          <th scope="col">Todo</th>
          <th scope="col">Action</th>
          <th scope="col">Action</th>
        </tr>
      </thead>
      <tbody id="todoid">
        <!-- Dynamic Content -->
      </tbody>
    </table>
  </div>
  <script>
    let todoarray = [];

    function addList(){
        
        let item = document.getElementById('item').value;
        todoarray.push(item);
        display();
    }

    function display(){
         document.getElementById('edit').style.display = "none";
         document.getElementById('add').style.display = "block";
        str="";
        for(i=0;i<todoarray.length;i++){
            str+=`
                <tr>
                    <td>${i+1}</td>
                    <td>${todoarray[i]}</td>
                    <td><button class="btn btn-danger" onclick="delItem(${i})">DELETE</button></td>
                    <td><button class="btn btn-danger" onclick="editItem(${i})">Edit</button></td>

                </tr>
            `;
        }
        document.getElementById('todoid').innerHTML=str;
    }
    function delItem(i){
        todoarray.splice(i,1);
        display();
    }

    function editItem(i){
        document.getElementById('edit').style.display="block";
        document.getElementById('add').style.display="none";

        document.getElementById('item').value=todoarray[i];
        document.getElementById('itemid').value=i;
    }
    function editList(){
        let item = document.getElementById('item').value;
        let index = document.getElementById('itemid').value;
        todoarray.splice(index,1,item);
        display();
    }
    
    window.onload=display();
  </script>
</body>
</html>
