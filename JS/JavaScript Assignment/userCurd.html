<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CRUD</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
  <div class="container d-flex justify-content-center mt-5">
    <div class="card position-relative shadow p-4 w-100" style="max-width: 400px;">
      <h4 class="mb-4 text-center">Todo List</h4>

      <form>
        <div class="mb-3">
          <label for="name" class="form-label">Username</label>
          <input type="text" class="form-control" id="name" placeholder="Enter Username">
        </div>
        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <input type="text" class="form-control" id="email" placeholder="Enter Email">
        </div>
        <div class="mb-3">
          <label for="contact" class="form-label">Contact</label>
          <input type="text" class="form-control" id="contact" placeholder="Enter Contact">
        </div>

        <input type="hidden" id="itemid">
        <button id="add" type="button" class="btn btn-primary w-100 mt-4" onclick="addUser()">Add User</button>
        <button id="edit" type="button" class="btn btn-warning w-100 mt-4" onclick="editList()" style="display:none;">Update User</button>
      </form>
    </div>
  </div>

  <div class="container mt-5">
    <h2 class="text-center mb-4">Your Tasks</h2>
    <table class="table table-bordered table-striped">
      <thead class="table-dark">
        <tr>
          <th>#</th>
          <th>Username</th>
          <th>Email</th>
          <th>Contact</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="userid">
        <!-- Dynamic Content -->
      </tbody>
    </table>
  </div>

  <script>
    let userarray = [];

    function addUser() {
      let name = document.getElementById("name").value.trim();
      let email = document.getElementById("email").value.trim();
      let contact = document.getElementById("contact").value.trim();

      if (!name || !email || !contact) {
        alert("Please fill all fields.");
        return;
      }

      userarray.push({ name, email, contact });

      resetForm();
      showUser();
    }

    function showUser() {
      let str = "";
      for (let i = 0; i < userarray.length; i++) {
        str += `
          <tr>
            <td>${i + 1}</td>
            <td>${userarray[i].name}</td>
            <td>${userarray[i].email}</td>
            <td>${userarray[i].contact}</td>
            <td>
              <button class="btn btn-danger btn-sm" onclick="userDel(${i})">Delete</button>
              <button class="btn btn-info btn-sm" onclick="editUser(${i})">Edit</button>
            </td>
          </tr>
        `;
      }
      document.getElementById("userid").innerHTML = str;
    }

    function userDel(i) {
      userarray.splice(i, 1);
      showUser();
    }

    function editUser(i) {
      document.getElementById('edit').style.display = "block";
      document.getElementById('add').style.display = "none";

      document.getElementById("name").value = userarray[i].name;
      document.getElementById("email").value = userarray[i].email;
      document.getElementById("contact").value = userarray[i].contact;
      document.getElementById("itemid").value = i;
    }

    function editList() {
      let id = document.getElementById("itemid").value;
      let name = document.getElementById("name").value.trim();
      let email = document.getElementById("email").value.trim();
      let contact = document.getElementById("contact").value.trim();

      if (!name || !email || !contact) {
        alert("Please fill all fields.");
        return;
      }

      userarray[id] = { name, email, contact };

      resetForm();
      showUser(); 
    }

    function resetForm() {
      document.getElementById("name").value = "";
      document.getElementById("email").value = "";
      document.getElementById("contact").value = "";
      document.getElementById("itemid").value = "";
      document.getElementById('edit').style.display = "none";
      document.getElementById('add').style.display = "block";
    }
  </script>
</body> 
</html>
