<script>
    let i,j,str;
    for(i=1;i<=5;i++){
        str="";
        for(j=1;j<=5-i;j++){
            str+=" ";
        }
        for(j=1;j<=2*i-1;j++){
            str+="*";
        }
        console.log(str);
    }
</script>
