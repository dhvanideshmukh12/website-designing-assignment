<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fibonacci</title>
</head>
<body>
    <p id="result"></p>
</body>
<script>

    function f(n){
        if (n === 0) return 0;
        if (n === 1) return 1;
         return f(n - 1) + f(n - 2);
    }
    
    let n=10, str;
    for(i=0;i<=n;i++){
        // console.log(f(i));
        str += f(i) + ", ";
    }

    str = document.getElementById("result").innerHTML=str.slice(0, -2);
</script>
</html>
