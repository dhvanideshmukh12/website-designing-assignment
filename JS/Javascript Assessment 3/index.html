<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

</head>
<body>
    <body class="p-4">

        <!-- Form -->
        <div class="container mb-5">
            <h3>Add Product</h3>
            <form id="productForm">
            <div class="mb-2">
                <label for="name" class="form-label">Product Name</label>
                <input type="text" id="name" class="form-control" required>
            </div>
            <div class="mb-2">
                <label for="img" class="form-label">Image URL</label>
                <input type="text" id="img" class="form-control" required>
            </div>
            <div class="mb-2">
                <label for="quantity" class="form-label">Quantity</label>
                <input type="number" id="quantity" class="form-control" required min="1">
            </div>
            <div class="mb-2">
                <label for="price" class="form-label">Price (₹)</label>
                <input type="number" id="price" class="form-control" required min="1">
            </div>
            <button id="add" type="button" class="btn btn-primary mt-3" onclick="addUser()">Add to Bag</button>
            </form>
        </div>

          <!-- Cards Display Area -->
            <div class="container">
                <h4>Your Shopping Bag</h4>
                <div id="cardsContainer" class="row g-3"></div>
            </div>

    </body>
<script>
    let userarray = [];

    function addUser() {
        let name = document.getElementById("name").value;
        let img = document.getElementById("img").value;
        let quantity = parseInt(document.getElementById("quantity").value);
        let price = parseFloat(document.getElementById("price").value);

        userarray.push({ name, img, quantity, price, liked: false });
        showUser();
    }

    function showUser() {
        let str = "";
        for (let i = 0; i < userarray.length; i++) {
            let user = userarray[i];
            str += `
                <div class="card shadow col-md-4" id="card-${i}">
                    <div class="card-body text-center">
                        <div class="d-flex justify-content-end mb-2">
                            <i class="bi bi-x me-2 text-danger" style="cursor: pointer;" onclick="deleteCard(${i})"></i>
                            <i class="bi ${user.liked ? 'bi-heart-fill' : 'bi-heart'} text-danger" style="cursor: pointer;" onclick="toggleHeart(${i})"></i>
                        </div>
                        <img src="${user.img}" alt="${user.name}" class="img-fluid mb-2" style="max-height: 150px; object-fit: contain;">
                        <p class="fw-bold mb-1">${user.name}</p>
                        <div class="d-flex justify-content-center align-items-center gap-2 mb-1">
                            <button class="btn btn-sm btn-outline-secondary" onclick="changeQuantity(${i}, -1)">-</button>
                            <span><strong>${user.quantity}</strong></span>
                            <button class="btn btn-sm btn-outline-secondary" onclick="changeQuantity(${i}, 1)">+</button>
                        </div>
                        <p class="mb-0 text-success">₹${user.price}</p>
                    </div>
                </div>
            `;
        }
        document.getElementById("cardsContainer").innerHTML = str;
    }

    function deleteCard(index) {
        userarray.splice(index, 1);
        showUser();
    }

    function toggleHeart(index) {
        userarray[index].liked = !userarray[index].liked;
        showUser();
    }

    function changeQuantity(index, change) {
        let newQuantity = userarray[index].quantity + change;
        if (newQuantity < 1) return;
        userarray[index].quantity = newQuantity;
        showUser();
    }
    
</script>

</html>
