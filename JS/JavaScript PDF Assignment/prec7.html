<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Minimum of Two Numbers</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .container {
      background: #fff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
      text-align: center;
    }
    input {
      padding: 10px;
      margin: 10px;
      width: 200px;
    }
    button {
      padding: 10px 20px;
      background: #007bff;
      color: #fff;
      border: none;
      cursor: pointer;
      margin-top: 10px;
      border-radius: 5px;
    }
    button:hover {
      background: #0056b3;
    }
    .result {
      margin-top: 20px;
      font-size: 18px;
      color: green;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Find Minimum of Two Numbers</h2>
    <input type="number" id="num1" placeholder="Enter first number"><br>
    <input type="number" id="num2" placeholder="Enter second number"><br>
    <button onclick="findMinimum()">Get Minimum</button>
    <div class="result" id="result"></div>
  </div>

  <script>
    function findMinimum() {
      let n1 = parseFloat(document.getElementById("num1").value);
      let n2 = parseFloat(document.getElementById("num2").value);
      let result = document.getElementById("result");

      if (isNaN(n1) || isNaN(n2)) {
        result.textContent = "Please enter valid numbers.";
      } else if (n1 < n2) {
        result.textContent = "Minimum number is: " + n1;
      } else if (n2 < n1) {
        result.textContent = "Minimum number is: " + n2;
      } else {
        result.textContent = "Both numbers are equal.";
      }
      
      document.getElementById("num1").value = "";
      document.getElementById("num2").value = "";
    }
    
  </script>

</body>
</html>
