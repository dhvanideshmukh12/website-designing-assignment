<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Multiplication Table</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: #f4f6f9;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    form {
      background: #fff;
      padding: 40px;
      margin-top: 80px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      text-align: center;
    }

    .form-controller {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    h1 {
      color: #333;
      font-size: 32px;
    }

    label {
      font-size: 16px;
      font-weight: bold;
      color: #555;
    }

    input[type="number"] {
      padding: 10px;
      width: 250px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 16px;
    }

    input[type="submit"] {
      background: #007bff;
      color: #fff;
      border: none;
      padding: 10px 20px;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.3s;
    }

    input[type="submit"]:hover {
      background: #0056b3;
    }

    #output {
      margin-top: 30px;
      background: #fff;
      padding: 20px 30px;
      border-radius: 10px;
      box-shadow: 0 5px 10px rgba(0,0,0,0.1);
      width: 300px;
      text-align: left;
    }

    #output div {
      margin-bottom: 8px;
      font-size: 18px;
      color: #333;
    }

    #output h3 {
      margin-bottom: 15px;
      color: #007bff;
      font-size: 24px;
    }
  </style>
</head>
<body>
  <form method="post" onsubmit="displayTbl(event)">
    <div class="form-controller">
      <h1>Multiplication Table</h1>
      <div class="input-box">
        <label for="num">Enter a number</label><br>
        <input type="number" id="num" required>
      </div>
      <input type="submit" value="Generate Table">
    </div>
  </form>
  <div id="output"></div>

  <script>
    function displayTbl(event) {
      event.preventDefault();

      let num = document.getElementById("num").value;
      let output = document.getElementById('output');
      output.innerHTML = "";

      if (isNaN(num) || num === "") {
        output.innerHTML = "<p>Please enter a valid number.</p>";
        return;
      }

      let table = `<h3>Table of ${num}</h3>`;
      for (let i = 1; i <= 10; i++) {
        table += `<div>${num} × ${i} = ${num * i}</div>`;
      }

      output.innerHTML = table;
      document.getElementById('num').value = "";
    }
  </script>
</body>
</html>
