<!-- 3. Create a live word counter using a textarea and keyup event -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Live Word Counter</title>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>


    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Inter', sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg, #e0f7fa, #e0e7ff);
        }

        .card{
            width:400px;
            background:#fff;
            padding:25px;
            border-radius:20px;
            box-shadow:0 10px 25px rgba(0,0,0,0.1);
        }

        h2{
            margin-bottom:15px;
            color:#2c3e50;
        }

        textarea{
            width:100%;
            height:120px;
            padding:10px;
            border-radius:10px;
            border:1px solid #ccc;
            resize:none;
            outline:none;
        }

        .count{
            margin-top:10px;
            font-weight:500;
            color:#555;
        }

        .count span{
            color:#6366f1;
            font-weight:600;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Live Word Counter</h2>

        <textarea id="textInput" placeholder="Start typing..."></textarea>

        <div class="count">
            Words: <span id="wordCount">0</span> | 
            Characters: <span id="charCount">0</span>
        </div>
    </div>

    <script>
        $(document).ready(function(){

            $("#textInput").keyup(function(){

                let text = $(this).val();

                $("#charCount").text(text.length);

                let words = text.trim().split(/\s+/);
                let wordCount = text.trim() === "" ? 0 : words.length;

                $("#wordCount").text(wordCount);

            });

        });
    </script>

</body>
</html>
