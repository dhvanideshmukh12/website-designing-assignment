<!-- 2. Write a program to show a hidden element using a button. -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Show Element using jQuery</title>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        .banner{
            height:100vh;
            background: linear-gradient(135deg, #899cf4, #0040ff);
            display:flex;
            justify-content:center;
            align-items:center;
            text-align:center;
            color:#fff;
        }

        .content{
            max-width:500px;
        }

        h1{
            margin-bottom:15px;
        }

        p{
            margin-bottom:20px;
            display:none; 
        }

        .btn{
            padding:10px 20px;
            border:none;
            border-radius:25px;
            background:#fff;
            color:#000;
            cursor:pointer;
            transition:0.3s;
        }

        .btn:hover{
            background:#14002a;
            color:#ffffff;
        }
    </style>
</head>
<body>

    <section class="banner">
        <div class="content">
            <h1>jQuery Show Example</h1>
            <p id="para">This text was hidden. Now it's visible! </p>
            <button class="btn" id="showBtn">Show Text</button>
        </div>
    </section>

    <script>
        $(document).ready(function(){
            $("#showBtn").click(function(){
                $("#para").fadeIn(800); 
            });
        });
    </script>

</body>
</html>
