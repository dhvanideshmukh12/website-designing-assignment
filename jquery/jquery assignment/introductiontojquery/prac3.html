<!-- 3. Create two buttons: Hide and Show using jQuery. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hide & Show using jQuery</title>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins', sans-serif;
        }

        body{
            background:#f5f5f5;
        }

        .banner{
            height:100vh;
            background: linear-gradient(135deg, #899cf4, #0040ff);
            display:flex;
            justify-content:center;
            align-items:center;
            text-align:center;
            color:#fff;
        }

        .content{
            max-width:600px;
        }

        h1{
            margin-bottom:15px;
            font-size:36px;
        }

        p{
            margin-bottom:25px;
            font-size:18px;
        }

        .btn-group{
            display:flex;
            justify-content:center;
            gap:15px;
        }

        .btn{
            padding:10px 25px;
            border:none;
            border-radius:25px;
            cursor:pointer;
            font-weight:500;
            transition:0.3s;
        }

        .hide-btn{
            background:#fa5b5b;
            color:#fff;
        }

        .show-btn{
            background:#64ec68;
            color:#fff;
        }

        .btn:hover{
            transform:scale(1.05);
        }
    </style>
</head>
<body>

    <section class="banner">
        <div class="content">
            <h1>jQuery Hide & Show</h1>
            <p id="para">
                Click "Hide" to disappear me and "Show" to bring me back!
            </p>

            <div class="btn-group">
                <button class="btn hide-btn" id="hideBtn">Hide</button>
                <button class="btn show-btn" id="showBtn">Show</button>
            </div>
        </div>
    </section>

    <script>
        $(document).ready(function(){
            $("#hideBtn").click(function(){
                $("#para").fadeOut(800);
            });

            $("#showBtn").click(function(){
                $("#para").fadeIn(800);
            });
        });
    </script>

</body>
</html>
