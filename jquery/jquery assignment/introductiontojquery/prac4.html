<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>jQuery Selectors</title>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Inter', sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg, #e0eafc, #cfdef3);
        }

        .container{
            text-align:center;
            width:90%;
            max-width:700px;
        }

        h1{
            margin-bottom:25px;
            color:#2c3e50;
            font-weight:600;
        }

        .cards{
            display:flex;
            gap:20px;
            justify-content:center;
            flex-wrap:wrap;
            margin-bottom:30px;
        }

        .box{
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(10px);
            padding:20px;
            width:180px;
            border-radius:20px;
            box-shadow:0 8px 20px rgba(0,0,0,0.1);
            transition:0.3s;
            color:#2c3e50;
        }

        .box:hover{
            transform:translateY(-8px);
        }

        
        #box1{
            border:2px solid #a8c0ff;
        }

        .buttons{
            display:flex;
            justify-content:center;
            gap:15px;
        }

        button{
            padding:10px 22px;
            border:none;
            border-radius:30px;
            cursor:pointer;
            font-weight:500;
            transition:0.3s;
        }

        #idBtn{
            background:#a8c0ff;
            color:#fff;
        }

        .classBtn{
            background:#b8f2e6;
            color:#2c3e50;
        }

        button:hover{
            transform:scale(1.08);
            opacity:0.9;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>jQuery ID vs Class</h1>

        <div class="cards">
            <div id="box1" class="box">ID Box </div>
            <div class="box">Class Box </div>
            <div class="box">Class Box </div>
        </div>

        <div class="buttons">
            <button id="idBtn">Highlight ID</button>
            <button class="classBtn">Highlight Class</button>
        </div>
    </div>

    <script>
        $(document).ready(function(){

           
            $("#idBtn").click(function(){
                $("#box1")
                .css({
                    "background":"#dbeafe",
                    "transform":"scale(1.08)"
                });
            });

         
            $(".classBtn").click(function(){
                $(".box").not("#box1")
                .css("background","#d1fae5")
                .fadeOut(200)
                .fadeIn(400);
            });

        });
    </script>

</body>
</html>
